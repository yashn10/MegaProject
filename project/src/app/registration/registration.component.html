<div class="auth-page fade-in-up" style="align-items: flex-start; padding-top: 40px; padding-bottom: 40px;">
    <div class="auth-card" style="max-width: 560px;">
        <div style="text-align: center; margin-bottom: 10px;">
            <i class="fas fa-user-plus" style="font-size: 2.5rem; color: var(--primary);"></i>
        </div>
        <h1 style="text-align: center;">Create Account</h1>
        <p class="auth-subtitle" style="text-align: center;">Join Blood Buddies today</p>

        <form #userForm="ngForm" (ngSubmit)="addUser(userForm.value)">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Full Name</label>
                    <input type="text" class="form-control" ngModel name="fullname" placeholder="Enter full name"
                        required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Username</label>
                    <input type="text" class="form-control" ngModel name="username" placeholder="Choose username"
                        required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Email</label>
                    <input type="email" class="form-control" ngModel name="email" placeholder="Enter email" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Phone</label>
                    <input type="text" class="form-control" ngModel name="phone" placeholder="Phone number" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Age</label>
                    <input type="number" class="form-control" ngModel name="age" placeholder="Age" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Blood Group</label>
                    <select class="form-control" ngModel name="bloodgroup" required>
                        <option value="">Select</option>
                        <option>A+(Positive)</option>
                        <option>A-(Negative)</option>
                        <option>B+(Positive)</option>
                        <option>B-(Negative)</option>
                        <option>AB+(Positive)</option>
                        <option>AB-(Negative)</option>
                        <option>O+(Positive)</option>
                        <option>O-(Negative)</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Gender</label>
                    <select class="form-control" ngModel name="gender" required>
                        <option value="">Select</option>
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>
            </div>
            <div class="mb-4">
                <label>Password</label>
                <input type="password" class="form-control" ngModel name="password"
                    placeholder="Create a strong password" required>
            </div>
            <div class="row">
                <div class="col-6">
                    <button type="submit" class="btn btn-branded" style="width: 100%; margin-top: 0;">REGISTER</button>
                </div>
                <div class="col-6">
                    <button type="button" class="btn btn-branded-outline" style="width: 100%; margin-top: 0;"
                        (click)="clear()">CLEAR</button>
                </div>
            </div>
        </form>

        <div style="text-align: center; margin-top: 24px;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a routerLink="/login" style="color: var(--primary); font-weight: 600;">Sign
                    In</a>
            </p>
        </div>
    </div>
</div>
