<div class="fade-in-up" style="margin-top: 56px;">

    <!-- Product Listing -->
    <div *ngIf="isbuy == ''">

        <!-- Carousel -->
        <div id="orderCarousel" class="carousel slide" data-ride="carousel" style="width: 100%;">
            <ul class="carousel-indicators">
                <li data-target="#orderCarousel" data-slide-to="0" class="active"></li>
                <li data-target="#orderCarousel" data-slide-to="1"></li>
                <li data-target="#orderCarousel" data-slide-to="2"></li>
            </ul>
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="../assets/img/Crousel3.jpeg" alt="Pharmacy"
                        style="width: 100%; height: 400px; object-fit: cover;">
                </div>
                <div class="carousel-item">
                    <img src="../assets/img/WhatsApp Image 2023-03-26 at 11.44.20 PM.jpeg" alt="Pharmacy"
                        style="width: 100%; height: 400px; object-fit: cover;">
                </div>
                <div class="carousel-item">
                    <img src="../assets/img/WhatsApp Image 2023-03-26 at 11.55.21 PM.jpeg" alt="Pharmacy"
                        style="width: 100%; height: 400px; object-fit: cover;">
                </div>
            </div>
            <a class="carousel-control-prev" href="#orderCarousel" data-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </a>
            <a class="carousel-control-next" href="#orderCarousel" data-slide="next">
                <span class="carousel-control-next-icon"></span>
            </a>
        </div>

        <!-- Search -->
        <div class="container" style="padding: 40px 0 20px;">
            <div class="d-flex justify-content-center">
                <input type="text" class="form-control" placeholder="Search Medicine..." [(ngModel)]="searchtext"
                    style="max-width: 400px; border-radius: var(--radius-xl); padding: 12px 24px; border: 2px solid var(--border);">
                <button type="button" class="btn btn-branded" style="margin-left: 10px;">Search</button>
            </div>
        </div>

        <!-- Medicine Cards -->
        <div class="container" style="padding: 20px 0 60px;">
            <div class="row">
                <div class="col-lg-3 col-md-4 col-sm-6 mb-4" *ngFor="let item of cartlist; let i = index">
                    <div class="card-modern" style="height: 100%;">
                        <img [src]="item.img" style="width: 100%; height: 180px; object-fit: cover;">
                        <div style="padding: 16px;">
                            <h6 style="font-weight: 700; font-size: 0.88rem; min-height: 45px; margin-bottom: 8px;">
                                {{item.Name}}</h6>
                            <p style="color: var(--text-muted); font-size: 0.82rem; margin-bottom: 6px;">{{item.qty}}
                            </p>
                            <p style="font-weight: 800; color: var(--primary); font-size: 1.1rem; margin-bottom: 12px;">
                                ₹{{item.price}}</p>
                            <button class="btn btn-branded"
                                style="width: 100%; font-size: 0.82rem; padding: 8px; margin: 0;"
                                (click)="addtocart(i)">
                                <i class="fas fa-cart-plus" style="margin-right: 6px;"></i>Add to Cart
                            </button>
                            <button class="btn btn-accent"
                                style="width: 100%; font-size: 0.82rem; padding: 8px; margin-top: 6px;" (click)="buy()">
                                Buy Now
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Offer Banners -->
        <div class="container-fluid" style="padding: 30px; background: var(--surface-alt);">
            <div class="row">
                <div class="col-sm-4 mb-3" *ngFor="let imgs of [
          ['../assets/img/bank.jpeg', '../assets/img/WhatsApp Image 2023-03-26 at 2.46.04 PM.jpeg', '../assets/img/WhatsApp Image 2023-03-26 at 2.46.05 PM.jpeg'],
          ['../assets/img/Design1.jpg', '../assets/img/Design2.jpg', '../assets/img/Design4.jpg'],
          ['../assets/img/Design8.jpg', '../assets/img/Design7.jpg', '../assets/img/Design6.jpg']
        ]; let idx = index">
                    <div class="card-modern" style="overflow: hidden;">
                        <div [id]="'orderOfferCarousel' + idx" class="carousel slide" data-ride="carousel">
                            <div class="carousel-inner">
                                <div *ngFor="let img of imgs; let j = index" class="carousel-item"
                                    [class.active]="j === 0">
                                    <img [src]="img" alt="Offer" style="width: 100%; height: 150px; object-fit: cover;">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- Order / Checkout -->
    <div *ngIf="isbuy == 'yes'" class="container section-padding form-modern">
        <div class="section-header">
            <h2>Order Summary</h2>
        </div>

        <div class="row">
            <!-- Billing Form -->
            <div class="col-lg-8 mb-4">
                <div class="card-modern" style="padding: 30px;">
                    <h4 style="font-weight: 700; margin-bottom: 20px;">Billing Address</h4>
                    <form #userForm="ngForm" (ngSubmit)="order(userForm.value)">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label><i class="fas fa-user" style="margin-right: 6px;"></i>Full Name</label>
                                <input type="text" class="form-control" placeholder="Enter your full name" ngModel
                                    name="name">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label><i class="fas fa-envelope" style="margin-right: 6px;"></i>Email</label>
                                <input type="email" class="form-control" placeholder="Enter your email" ngModel
                                    name="email">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label><i class="fas fa-phone" style="margin-right: 6px;"></i>Phone</label>
                                <input type="number" class="form-control" placeholder="Contact number" ngModel
                                    name="phone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label><i class="fas fa-city" style="margin-right: 6px;"></i>City</label>
                                <input type="text" class="form-control" placeholder="Enter city" ngModel name="city">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label><i class="fas fa-map-marker-alt" style="margin-right: 6px;"></i>Address</label>
                            <input type="text" class="form-control" placeholder="Enter your address" ngModel
                                name="address">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>State</label>
                                <input type="text" class="form-control" placeholder="Enter state" ngModel name="state">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>PIN / ZIP</label>
                                <input type="number" class="form-control" placeholder="PIN code" ngModel name="pin">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-branded" style="width: 100%;">
                            <i class="fas fa-check" style="margin-right: 8px;"></i>Place Order
                        </button>
                    </form>
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="col-lg-4">
                <div class="card-modern" style="padding: 24px;">
                    <h5 style="font-weight: 700; text-align: center; margin-bottom: 16px;">
                        <i class="fas fa-shopping-cart" style="margin-right: 8px; color: var(--primary);"></i>Cart Items
                    </h5>
                    <hr>
                    <div style="max-height: 350px; overflow-y: auto; padding: 10px 0;">
                        <div *ngFor="let item of cart"
                            style="display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border);">
                            <span style="font-size: 0.85rem; flex: 1;">{{item.Name}}</span>
                            <span
                                style="font-weight: 700; color: var(--primary); white-space: nowrap; margin-left: 10px;">₹{{item.price}}</span>
                        </div>
                        <div *ngIf="cart.length === 0"
                            style="text-align: center; color: var(--text-muted); padding: 20px;">
                            Cart is empty
                        </div>
                    </div>
                    <hr>
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
                        <span style="font-weight: 800; font-size: 1.1rem;">Total</span>
                        <span
                            style="font-weight: 800; color: var(--primary); font-size: 1.2rem;">₹{{totalprice.toFixed(2)}}</span>
                    </div>
                    <button class="btn btn-branded-outline" style="width: 100%;" (click)="clearcart()">
                        <i class="fas fa-trash" style="margin-right: 6px;"></i>Clear Cart
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>
