<div class="auth-page fade-in-up">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 10px;">
            <i class="fas fa-shield-alt" style="font-size: 2.5rem; color: var(--accent);"></i>
        </div>
        <h1 style="text-align: center;">Admin Login</h1>
        <p class="auth-subtitle" style="text-align: center;">Authorized personnel only</p>

        <form [formGroup]="adminForm" (ngSubmit)="login()">
            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" class="form-control" id="adminEmail" formControlName="email"
                    placeholder="Enter admin email">
            </div>
            <div class="mb-4">
                <label>Password</label>
                <input type="password" class="form-control" id="adminPassword" formControlName="password"
                    placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 0;">LOGIN AS ADMIN</button>
        </form>

        <div style="text-align: center; margin-top: 24px;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Not an admin? <a routerLink="/login" style="color: var(--accent); font-weight: 600;">User Login</a>
            </p>
        </div>
    </div>
</div>
