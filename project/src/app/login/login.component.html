<div class="auth-page fade-in-up">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 10px;">
            <i class="fas fa-tint" style="font-size: 2.5rem; color: var(--primary);"></i>
        </div>
        <h1 style="text-align: center;">Sign In</h1>
        <p class="auth-subtitle" style="text-align: center;">Welcome back to Blood Buddies</p>

        <form [formGroup]="loginForm" (ngSubmit)="login()">
            <div class="mb-3">
                <label>Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" formControlName="email">
            </div>
            <div class="mb-4">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="Enter your password"
                    formControlName="password">
            </div>
            <button type="submit" class="btn btn-branded" style="width: 100%; margin-top: 0;">LOGIN</button>
        </form>

        <div style="text-align: center; margin-top: 24px;">
            <p style="color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a routerLink="/registration"
                    style="color: var(--primary); font-weight: 600;">Sign Up</a>
            </p>
        </div>
    </div>
</div>
