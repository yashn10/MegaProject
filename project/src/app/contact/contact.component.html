<div class="fade-in-up" style="margin-top: 56px;">
    <div
        style="background-image: url(../assets/img/contact.jpg); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; display: flex; align-items: center;">
        <div style="width: 100%; background: rgba(26, 26, 46, 0.85); padding: 60px 0;">
            <div class="container">
                <div class="section-header" style="margin-bottom: 40px;">
                    <h2 style="color: #fff;">Contact Us</h2>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-6 mb-4">
                        <div class="card-modern" style="padding: 30px;">
                            <form #userForm="ngForm" (ngSubmit)="addUser(userForm.value)" class="form-modern">
                                <div class="mb-3">
                                    <label>Your Name</label>
                                    <input type="text" class="form-control" ngModel name="name"
                                        placeholder="Enter your name">
                                </div>
                                <div class="mb-3">
                                    <label>Email Address</label>
                                    <input type="email" class="form-control" ngModel name="email"
                                        placeholder="Enter your email">
                                </div>
                                <div class="mb-3">
                                    <label>Phone Number</label>
                                    <input type="number" class="form-control" ngModel name="phone"
                                        placeholder="Enter your phone">
                                </div>
                                <div class="mb-4">
                                    <label>Your Message</label>
                                    <textarea class="form-control" rows="4" ngModel name="message"
                                        placeholder="Write your message..."></textarea>
                                </div>
                                <div class="row">
                                    <div class="col-6">
                                        <button type="submit" class="btn btn-branded"
                                            style="width: 100%; margin: 0;">Send Message</button>
                                    </div>
                                    <div class="col-6">
                                        <button type="button" class="btn btn-branded-outline"
                                            style="width: 100%; margin: 0;" (click)="clear()">Clear</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-4 offset-md-1 text-white" style="padding-top: 20px;">
                        <div style="margin-bottom: 30px;">
                            <h5 style="font-weight: 700; color: #fff;"><i class="fas fa-map-marker-alt"
                                    style="margin-right: 10px; color: var(--primary-light);"></i>Address</h5>
                            <p style="opacity: 0.8; margin-top: 8px;">1632 Main Street<br>New York, 94126<br>United
                                States</p>
                        </div>
                        <div style="margin-bottom: 30px;">
                            <h5 style="font-weight: 700; color: #fff;"><i class="fas fa-phone"
                                    style="margin-right: 10px; color: var(--primary-light);"></i>Phone</h5>
                            <p style="opacity: 0.8; margin-top: 8px;">+ 01 234 567 89</p>
                        </div>
                        <div>
                            <h5 style="font-weight: 700; color: #fff;"><i class="fas fa-envelope"
                                    style="margin-right: 10px; color: var(--primary-light);"></i>Email</h5>
                            <p style="opacity: 0.8; margin-top: 8px;">info@bloodbuddies.com</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
